@if(product){
    <section class="py-8">
      <div class="max-w-screen-2xl px-4 mx-auto">
        <div class="grid grid-cols-2 gap-8">
          <div class="max-w-xl mx-auto">
            <img src="{{product.pictureUrl}}" 
                alt="Image of {{product.name}}" 
                class="w-full">
          </div>

          <div class="mt-6 sm:mt-8 lg:mt-0">
            <h1 class="text-2xl font-semibold text-gray-900">
                {{product.name}}
            </h1>
            <p>You have {{quantityInCart}} of this item in your cart</p>
            <div class="mt-4 items-center gap-4 flex">
                <p class="text-3xl font-extrabold  text-gray-900">
                    {{product.price | currency:'USD'}}
                </p>
            </div>

            <div class="flex gap-5 mb-7 items-stretch">
                <button [disabled]="quantity === quantityInCart" 
                        (click)="updateCart()"
                        mat-flat-button
                        class="h-18 rounded-lg px-7">
                    <mat-icon>shopping_cart</mat-icon>
                    {{getButtonText()}}
                </button>

                <mat-form-field appearance="outline" class="flex flex-row h-12">
                    <mat-label>Quantity</mat-label>
                    <input matInput class="max-h-full" min="0" type="number" [(ngModel)]="quantity">
                </mat-form-field>
            </div>

            <mat-divider class="my-6"></mat-divider>

            <p class="mt-6 text-gray-500">
                {{product.description}}
            </p>
            
          </div>
        </div>
      </div>
    </section>
}
